      <stop stop-color="#171F19"/>
      <stop offset="0.52" stop-color="#101712"/>
      <stop offset="1" stop-color="#21130F"/>
    </linearGradient>

    <linearGradient id="pillBg" x1="226" y1="24" x2="316" y2="62" gradientUnits="userSpaceOnUse">
