<svg width="240" height="70" viewBox="0 0 240 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="240" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182019"/>
      <stop offset="0.55" stop-color="#111713"/>
      <stop offset="1" stop-color="#151223"/>
    </linearGradient>

    <linearGradient id="winnerBg" x1="134" y1="34" x2="226" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#162C1D"/>
      <stop offset="1" stop-color="#1F3A27"/>
    </linearGradient>

    <radialGradient id="avatarGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(35 36) rotate(90) scale(24)">
      <stop stop-color="#35F24C" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#35F24C" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <clipPath id="dragonflyClip" clipPathUnits="userSpaceOnUse">
      <circle cx="27" cy="47" r="8"/>
    </clipPath>

    <clipPath id="beetleClip" clipPathUnits="userSpaceOnUse">
      <circle cx="146" cy="47" r="8"/>
    </clipPath>
  </defs>

  <rect width="240" height="70" rx="22" fill="url(#cardBg)"/>
  <rect x="0.75" y="0.75" width="238.5" height="68.5" rx="21.25" stroke="#314036" stroke-width="1.5"/>

  <!-- Header -->
  <path d="M20 12L16.5 24H21L18.7 34L27.5 19.5H22.5L25 12H20Z" fill="#2EFF4A"/>
  <text x="34" y="25" fill="#2EFF4A" font-family="Arial, sans-serif" font-size="12" font-weight="800">Scenario result</text>
  <text x="184" y="25" fill="#9FA7A0" font-family="Arial, sans-serif" font-size="11" font-weight="700">won 3 cr</text>

  <!-- Matchup row: Dragonfly -->
  <rect x="14" y="36" width="88" height="22" rx="11" fill="#222622"/>

  <circle cx="27" cy="47" r="10" fill="url(#avatarGlow)" opacity="0.35" filter="url(#softGlow)"/>
  <circle cx="27" cy="47" r="8" fill="#111713"/>

  <image
    x="19"
    y="39"
    width="16"
    height="16"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#dragonflyClip)"
    href="data:image/webp;base64,"
  />

  <circle cx="27" cy="47" r="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>

  <text x="40" y="51" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="11" font-weight="800">Dragon</text>
  <rect x="77" y="41" width="17" height="12" rx="6" fill="#331919"/>
  <text x="85.5" y="50" text-anchor="middle" fill="#E85A5A" font-family="Arial, sans-serif" font-size="8" font-weight="800">B</text>

  <!-- VS -->
  <circle cx="120" cy="47" r="10" fill="#242824"/>
  <text x="120" y="51" text-anchor="middle" fill="#AEB6AE" font-family="Arial, sans-serif" font-size="9" font-weight="800">VS</text>

  <!-- Matchup row: Rhinoceros Beetle -->
  <rect x="134" y="36" width="92" height="22" rx="11" fill="url(#winnerBg)"/>

  <circle cx="146" cy="47" r="8" fill="#111713"/>

  <image
    x="138"
    y="39"
    width="16"
    height="16"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#beetleClip)"
    href="data:image/webp;base64,"
  />

  <circle cx="146" cy="47" r="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>

  <text x="159" y="51" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="11" font-weight="800">Beetle</text>
  <rect x="198" y="41" width="18" height="12" rx="6" fill="#33260F"/>
  <text x="207" y="50" text-anchor="middle" fill="#FF9B38" font-family="Arial, sans-serif" font-size="8" font-weight="800">A</text>

  <!-- Small outcome chips -->
  <rect x="20" y="60" width="36" height="6" rx="3" fill="#243028"/>
  <rect x="20" y="60" width="25" height="6" rx="3" fill="#2EFF4A"/>
  <rect x="66" y="60" width="36" height="6" rx="3" fill="#2B2613"/>
  <rect x="112" y="60" width="36" height="6" rx="3" fill="#2A1820"/>
  <rect x="158" y="60" width="36" height="6" rx="3" fill="#2A1E12"/>
</svg>