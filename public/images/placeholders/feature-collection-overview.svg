  <text x="370" y="247" fill="#8E9690" font-family="Arial, sans-serif" font-size="20" font-weight="800">/1000</text>
  <rect x="303" y="254" width="180" height="6" rx="3" fill="#2C332E"/>
  <rect x="303" y="254" width="180" height="6" rx="3" fill="#24D6C8"/>

