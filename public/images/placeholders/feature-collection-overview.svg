<svg width="537" height="500" viewBox="0 0 537 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="268.5" y1="0" x2="268.5" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111813"/>
      <stop offset="1" stop-color="#080B09"/>
    </linearGradient>

    <linearGradient id="panel" x1="24" y1="24" x2="513" y2="476" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D231F"/>
      <stop offset="1" stop-color="#111513"/>
    </linearGradient>

    <linearGradient id="statPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202622"/>
      <stop offset="1" stop-color="#151917"/>
    </linearGradient>

    <linearGradient id="mixBar" x1="52" y1="0" x2="485" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35C7E8"/>
      <stop offset="0.14" stop-color="#35C7E8"/>
      <stop offset="0.14" stop-color="#F58B25"/>
      <stop offset="0.78" stop-color="#F58B25"/>
      <stop offset="0.78" stop-color="#83C5F7"/>
      <stop offset="1" stop-color="#83C5F7"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="537" height="500" rx="36" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="535.5" height="498.5" rx="35.25" stroke="#2B352E" stroke-width="1.5"/>

  <!-- Header -->
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="489" height="116" rx="28" fill="url(#panel)"/>
    <rect x="24.75" y="24.75" width="487.5" height="114.5" rx="27.25" stroke="#303933" stroke-width="1.5"/>
  </g>

  <text x="48" y="67" fill="#31FF4F" font-family="Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="5">ANIMALDEX</text>
  <text x="48" y="108" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="34" font-weight="800">Collection profile</text>

  <circle cx="462" cy="82" r="30" fill="#252B27"/>
  <circle cx="462" cy="82" r="29.25" stroke="#404A43" stroke-width="1.5"/>
  <path d="M452 84L460 92L474 70" stroke="#31FF4F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top stats -->
