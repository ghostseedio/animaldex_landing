  <text x="68" y="374" fill="#07100B" font-family="Arial, sans-serif" font-size="15" font-weight="800">W</text>
  <text x="96" y="377" fill="#07100B" font-family="Arial, sans-serif" font-size="22" font-weight="900">6</text>
  <text x="248" y="374" text-anchor="middle" fill="#07100B" font-family="Arial, sans-serif" font-size="15" font-weight="800">Zoo</text>
  <text x="248" y="377" dx="34" fill="#07100B" font-family="Arial, sans-serif" font-size="22" font-weight="900">48</text>
  <text x="415" y="374" fill="#07100B" font-family="Arial, sans-serif" font-size="15" font-weight="800">D</text>
  <text x="457" y="377" fill="#07100B" font-family="Arial, sans-serif" font-size="22" font-weight="900">13</text>

