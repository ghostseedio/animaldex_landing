  <rect x="279.75" y="164.75" width="232.5" height="102.5" rx="27.25" stroke="#303933" stroke-width="1.5"/>
  <text x="303" y="204" fill="#9BA39D" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SPECIES</text>
