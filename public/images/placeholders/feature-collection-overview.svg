  <text x="136" y="461" text-anchor="end" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="28" font-weight="900">13</text>
  <rect x="45" y="466" width="110" height="4" rx="2" fill="#31FF4F"/>

  <rect x="192" y="428" width="152" height="48" rx="20" fill="url(#statPanel)"/>
  <rect x="192.75" y="428.75" width="150.5" height="46.5" rx="19.25" stroke="#303933" stroke-width="1.5"/>
  <text x="213" y="456" fill="#9BA39D" font-family="Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.5">SETS</text>
  <text x="304" y="461" text-anchor="end" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="28" font-weight="900">22</text>
  <rect x="213" y="466" width="110" height="4" rx="2" fill="#8F4DFF"/>

  <rect x="360" y="428" width="153" height="48" rx="20" fill="url(#statPanel)"/>
  <rect x="360.75" y="428.75" width="151.5" height="46.5" rx="19.25" stroke="#303933" stroke-width="1.5"/>
  <text x="381" y="456" fill="#9BA39D" font-family="Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.5">MIS</text>
  <text x="473" y="461" text-anchor="end" fill="#F4FFF5" font-family="Arial, sans-serif" font-size="28" font-weight="900">17</text>
  <rect x="381" y="466" width="110" height="4" rx="2" fill="#24D6C8"/>

