    <path d="M87 72L108 88L100 114H74L66 88L87 72Z" stroke="#31FF4F" stroke-width="2"/>
    <path d="M87 84L98 92L94 106H80L76 92L87 84Z" fill="#31FF4F" opacity="0.25"/>
